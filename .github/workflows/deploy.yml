name: deploy-book

# Der Workflow startet automatisch bei jedem Push auf den Main-Branch
on:
  push:
    branches:
      - main

# Erforderliche Berechtigungen, um die Website auf GitHub Pages zu schreiben
permissions:
  contents: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      # 1. Code aus dem Repository auschecken
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Python-Umgebung auf dem GitHub-Server einrichten
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Alle Abhängigkeiten aus deiner requirements.txt installieren
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 4. Das Jupyter Book vollautomatisch bauen
      - name: Build the book
        run: |
          myst build

      # 5. Den fertigen HTML-Ordner auf den GitHub-Pages-Branch (gh-pages) pushen
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book1/_build/html # Pfad zu deinem fertigen HTML-Build