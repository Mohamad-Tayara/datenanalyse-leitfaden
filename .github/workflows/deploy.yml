name: deploy-book

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # KORREKTUR 1: 'python -m mystmd' statt nur 'myst' verwenden
      - name: Build the book
        run: |
          python -m mystmd build

      # KORREKTUR 2: Pfad leicht korrigiert (falls die HTML-Ausgabe direkt in _build/html landet)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book1/_build/html